name: Auto Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # Allow manual trigger from GitHub Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.124.1
      BASE_URL: "https://thomaschangsf.github.io/"

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────────
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Hugo's .GitInfo

      # ── 2. Install Hugo ─────────────────────────────────────────────────────
      - name: Install Hugo
        run: |
          wget -O /tmp/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i /tmp/hugo.deb

      # ── 3. Build the site ───────────────────────────────────────────────────
      - name: Build Hugo site
        run: |
          cd sites/thomas_chang
          hugo --gc --minify --baseURL "$BASE_URL"
          echo "✓ Build complete. Pages: $(find public -name '*.html' | wc -l)"

      # ── 4. Deploy to gh-pages branch ────────────────────────────────────────
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./sites/thomas_chang/public
          publish_branch: gh-pages
          commit_message: "Auto-deploy from main@${{ github.sha }}"
          force_orphan: false    # Keep gh-pages history
          enable_jekyll: false   # Add .nojekyll automatically
