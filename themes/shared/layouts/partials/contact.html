<section class="contact section" id="contact" aria-label="Contact">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">Contact</span>
      <h2 class="section-title">{{ .Site.Params.contact.heading }}</h2>
      <p class="section-subtitle">{{ .Site.Params.contact.subtext }}</p>
    </div>
    <div class="contact-links">
      {{ range .Site.Params.contact.links }}
      <a href="{{ .url }}" class="contact-link" {{ if .external }}target="_blank" rel="noopener noreferrer"{{ end }} aria-label="{{ .label }}">
        <span class="contact-link-icon" aria-hidden="true">{{ .icon }}</span>
        <span class="contact-link-label">{{ .label }}</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
