{{ define "main" }}
<article class="container content-page">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
  </header>
  <div class="page-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
