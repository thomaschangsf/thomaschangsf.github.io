{{ define "main" }}
<section class="container content-page">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </header>
  <ul class="list-grid">
    {{ range .Pages }}
    <li class="list-item">
      <a href="{{ .Permalink }}" class="list-link">
        <h2 class="list-item-title">{{ .Title }}</h2>
        <p class="list-item-date">{{ .Date.Format "Jan 2, 2006" }}</p>
        {{ with .Summary }}<p class="list-item-summary">{{ . }}</p>{{ end }}
      </a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
